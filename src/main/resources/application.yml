server:
  port: 8086

spring:
  application:
    name: ai-sim-trans

simtrans:
  mode: ${SIMTRANS_MODE:local-asr}

  audio:
    provider: windows-wasapi
    device-name:
    sample-rate: 16000
    channels: 1
    chunk-samples: 512
    queue-capacity: 16
    native-library: LiveTranslateAudio

  asr:
    provider: dashscope
    base-url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen3.5-livetranslate-flash-realtime
    language: auto
    turn-detection: server_vad
    silence-duration-ms: 700
    prefix-padding-ms: 300
    threshold: 0.5

  vad:
    provider: ${VAD_PROVIDER:energy}
    min-speech-ms: 320
    min-silence-ms: 500
    max-speech-ms: 5000
    threshold: 0.3
    energy-threshold: 0.003
    speech-density-threshold: 0.25
    incremental-asr: true
    interim-interval-ms: 1200
    silero-model: models/vad/silero/silero_vad.onnx

  local-asr:
    engine: ${LOCAL_ASR_ENGINE:sensevoice}
    model-id: ${LOCAL_ASR_MODEL:iic/SenseVoiceSmall}
    models-dir: ${LOCAL_ASR_MODELS_DIR:models}
    download-source: ${LOCAL_ASR_DOWNLOAD_SOURCE:modelscope}
    device: ${LOCAL_ASR_DEVICE:cuda}
    compute-type: ${LOCAL_ASR_COMPUTE_TYPE:float16}
    python: ${LOCAL_ASR_PYTHON:py}
    service-port: ${LOCAL_ASR_SERVICE_PORT:18765}
    startup-timeout: 120s
    model-timeout: 2h

  translation:
    provider: openai-compatible
    base-url: ${TRANSLATION_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${TRANSLATION_API_KEY:${DASHSCOPE_API_KEY:}}
    model: ${TRANSLATION_MODEL:qwen-turbo}
    target-language: zh-CN
    prompt: ${TRANSLATION_PROMPT:}
    stream: true
    context-segments: 0
    temperature: 0.2
    timeout: 45s

  correction:
    enabled: ${CORRECTION_ENABLED:true}
    review-window-segments: 4
    min-completed-segments: 2
    debounce-ms: 500
    confidence-threshold: 0.75
    max-corrections-per-segment: 2
    timeout: 15s

  subtitle:
    max-lines: 2
    show-source: true
    opacity: 0.86
    font-size: 28
