<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Sim Trans</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="toolbar" aria-label="&#25511;&#21046;&#38754;&#26495;">
      <div>
        <p class="eyebrow">&#23454;&#26102;&#23383;&#24149;&#32763;&#35793;</p>
        <h1>AI &#21516;&#22768;&#20256;&#35793;&#21161;&#25163;</h1>
      </div>
      <div class="actions">
        <button id="startBtn">&#21551;&#21160;</button>
        <button id="stopBtn" class="secondary">&#20572;&#27490;</button>
      </div>
      <p id="status" class="status">&#26410;&#36830;&#25509;</p>
    </section>

    <section class="settings" aria-label="&#36816;&#34892;&#35774;&#32622;">
      <label>
        <span>&#27169;&#24335;</span>
        <select id="modeSelect"></select>
      </label>
      <label>
        <span>&#38899;&#39057;&#36755;&#20986;</span>
        <select id="audioDeviceSelect"></select>
      </label>
      <label data-local-only>
        <span>ASR &#24341;&#25806;</span>
        <select id="asrEngineSelect"></select>
      </label>
      <label class="wide" data-local-only>
        <span>ASR &#27169;&#22411;</span>
        <input id="asrModelInput" type="text" autocomplete="off">
      </label>
      <label data-local-only>
        <span>VAD</span>
        <select id="vadSelect"></select>
      </label>
      <label data-local-only>
        <span>&#25512;&#29702;&#35774;&#22791;</span>
        <select id="deviceSelect">
          <option value="cpu">cpu</option>
          <option value="cuda">cuda</option>
        </select>
      </label>
      <label data-local-only>
        <span>&#32763;&#35793;&#27169;&#22411;</span>
        <input id="translationModelInput" type="text" autocomplete="off">
      </label>
      <label class="wide" data-local-only>
        <span>&#32763;&#35793;&#25509;&#21475;</span>
        <input id="translationBaseUrlInput" type="text" autocomplete="off">
      </label>
      <div class="model-actions">
        <button id="saveRuntimeBtn" class="secondary">&#20445;&#23384;&#35774;&#32622;</button>
        <button id="loadModelBtn" class="secondary" data-local-control>&#21152;&#36733;&#27169;&#22411;</button>
        <p id="modelStatus" class="model-status">&#27169;&#22411;&#23578;&#26410;&#26816;&#26597;</p>
      </div>
    </section>

    <section class="subtitle-stage" aria-live="polite">
      <div id="subtitleList" class="subtitle-list"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
