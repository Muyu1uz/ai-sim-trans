<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 同声传译助手</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="toolbar" aria-label="控制台">
      <div>
        <p class="eyebrow">Live Translate</p>
        <h1>AI 同声传译助手</h1>
      </div>
      <div class="actions">
        <button id="startBtn">Start</button>
        <button id="stopBtn" class="secondary">Stop</button>
      </div>
      <p id="status" class="status">disconnected</p>
    </section>

    <section class="subtitle-stage" aria-live="polite">
      <div id="subtitleList" class="subtitle-list"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
